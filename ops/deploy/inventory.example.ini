# Copy this file to ops/deploy/inventory.ini and replace placeholders locally.
# Do not commit real server IPs, SSH key paths, or operator-only inventory.
#
# Phase 2 model:
# - primary is the current production region.
# - Mumbai and Cape Town are manually deployable standby regions.
# - standby_regions intentionally does not imply automatic failover.

[primary]
primary-london ansible_host=YOUR_PRIMARY_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=/path/to/primary.pem ansible_python_interpreter=/usr/bin/python3

[mumbai]
mumbai-standby ansible_host=YOUR_MUMBAI_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=/path/to/mumbai.pem ansible_python_interpreter=/usr/bin/python3 region_name=mumbai

[capetown]
capetown-standby ansible_host=YOUR_CAPETOWN_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=/path/to/capetown.pem ansible_python_interpreter=/usr/bin/python3 region_name=capetown

[standby_regions:children]
mumbai
capetown

# Backward-compatible aliases for the existing deploy runbook/playbook.
[active:children]
primary

[standby:children]
standby_regions

[mscqr_servers:children]
primary
standby_regions

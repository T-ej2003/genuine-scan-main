<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" rx="24" fill="#F7FAFC"/>
  <rect x="40" y="40" width="220" height="820" rx="20" fill="#10253F"/>
  <rect x="80" y="320" width="150" height="58" rx="14" fill="#22C55E"/>
  <text x="92" y="358" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="700">Diagnostics</text>
  <rect x="290" y="40" width="1070" height="90" rx="20" fill="#FFFFFF" stroke="#D7E0EA"/>
  <text x="340" y="96" fill="#0F172A" font-family="Arial, sans-serif" font-size="44" font-weight="700">Printer Diagnostics</text>
  <rect x="290" y="150" width="1070" height="680" rx="24" fill="#FFFFFF" stroke="#D7E0EA"/>
  <rect x="330" y="188" width="990" height="110" rx="18" fill="#ECFDF5" stroke="#10B981"/>
  <text x="360" y="236" fill="#065F46" font-family="Arial, sans-serif" font-size="34" font-weight="700">Compatibility matrix</text>
  <text x="360" y="274" fill="#065F46" font-family="Arial, sans-serif" font-size="22">LOCAL_AGENT for USB / Wi-Fi / home printers. NETWORK_DIRECT for registered ZPL, TSPL, EPL, and CPCL LAN printers.</text>

  <rect x="330" y="330" width="470" height="200" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="360" y="380" fill="#0F172A" font-family="Arial, sans-serif" font-size="32" font-weight="700">LOCAL_AGENT</text>
  <text x="360" y="420" fill="#475569" font-family="Arial, sans-serif" font-size="22">USB, Wi-Fi, home, office, and driver-managed industrial printers.</text>
  <text x="360" y="460" fill="#475569" font-family="Arial, sans-serif" font-size="22">Requires local agent + operating system printer visibility.</text>

  <rect x="850" y="330" width="470" height="200" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="880" y="380" fill="#0F172A" font-family="Arial, sans-serif" font-size="32" font-weight="700">NETWORK_DIRECT</text>
  <text x="880" y="420" fill="#475569" font-family="Arial, sans-serif" font-size="22">Industrial LAN printers registered by IP/port.</text>
  <text x="880" y="460" fill="#475569" font-family="Arial, sans-serif" font-size="22">Supported now: ZPL, TSPL, EPL, CPCL.</text>

  <rect x="330" y="572" width="990" height="180" rx="18" fill="#FCFEFF" stroke="#D7E0EA"/>
  <text x="360" y="622" fill="#0F172A" font-family="Arial, sans-serif" font-size="30" font-weight="700">Registered printer profiles</text>
  <text x="360" y="658" fill="#64748B" font-family="Arial, sans-serif" font-size="20">Use Test after registration to confirm connectivity and language readiness.</text>
  <rect x="1030" y="616" width="120" height="44" rx="12" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <text x="1070" y="645" fill="#0F172A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Test</text>
  <rect x="1180" y="616" width="110" height="44" rx="12" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <text x="1210" y="645" fill="#0F172A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Edit</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#DC2626"/>
    </marker>
  </defs>

  <path d="M1240 120C1260 170 1270 210 1190 240" stroke="#DC2626" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1020" y="110" fill="#DC2626" font-family="Arial, sans-serif" font-size="28" font-weight="700">1. Choose the right pattern</text>
  <text x="1010" y="144" fill="#DC2626" font-family="Arial, sans-serif" font-size="22">Home/Wi-Fi printers stay on LOCAL_AGENT.</text>

  <path d="M1250 560C1300 580 1320 620 1292 636" stroke="#DC2626" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1040" y="552" fill="#DC2626" font-family="Arial, sans-serif" font-size="28" font-weight="700">2. Test every profile</text>
  <text x="1035" y="586" fill="#DC2626" font-family="Arial, sans-serif" font-size="22">Connectivity and language support are checked here.</text>
</svg>

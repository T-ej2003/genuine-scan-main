<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" rx="24" fill="#F7FAFC"/>
  <rect x="40" y="40" width="220" height="820" rx="20" fill="#10253F"/>
  <rect x="80" y="220" width="150" height="58" rx="14" fill="#22C55E"/>
  <text x="102" y="258" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">Batches</text>
  <rect x="290" y="40" width="1070" height="90" rx="20" fill="#FFFFFF" stroke="#D7E0EA"/>
  <text x="340" y="96" fill="#0F172A" font-family="Arial, sans-serif" font-size="44" font-weight="700">Assigned Batches</text>
  <rect x="430" y="180" width="790" height="540" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="470" y="230" fill="#0F172A" font-family="Arial, sans-serif" font-size="34" font-weight="700">Create Print Job</text>
  <text x="470" y="266" fill="#64748B" font-family="Arial, sans-serif" font-size="20">Choose a printer profile, confirm dispatch mode, and start a controlled print job.</text>
  <rect x="470" y="306" width="700" height="50" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="500" y="339" fill="#475569" font-family="Arial, sans-serif" font-size="22">Quantity to print</text>
  <rect x="470" y="390" width="330" height="56" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="500" y="424" fill="#475569" font-family="Arial, sans-serif" font-size="22">Registered printer profile</text>
  <rect x="840" y="390" width="330" height="56" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="900" y="424" fill="#065F46" font-family="Arial, sans-serif" font-size="22" font-weight="700">Dispatch mode: LOCAL_AGENT</text>
  <rect x="470" y="482" width="330" height="54" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="520" y="516" fill="#475569" font-family="Arial, sans-serif" font-size="22">Active workstation printer</text>
  <rect x="840" y="482" width="330" height="54" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="905" y="516" fill="#475569" font-family="Arial, sans-serif" font-size="22">Open diagnostics</text>
  <rect x="930" y="620" width="240" height="58" rx="16" fill="#10B981"/>
  <text x="968" y="656" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="700">Create Print Job</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#DC2626"/>
    </marker>
  </defs>

  <path d="M1080 120C1060 180 1030 220 990 390" stroke="#DC2626" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1000" y="112" fill="#DC2626" font-family="Arial, sans-serif" font-size="28" font-weight="700">1. Select a registered printer profile</text>
  <text x="1020" y="146" fill="#DC2626" font-family="Arial, sans-serif" font-size="22">The mode is fixed by the profile.</text>

  <path d="M1220 450C1270 470 1290 500 1165 510" stroke="#DC2626" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1110" y="500" fill="#DC2626" font-family="Arial, sans-serif" font-size="28" font-weight="700">2. Validate printer readiness</text>
  <text x="1130" y="534" fill="#DC2626" font-family="Arial, sans-serif" font-size="22">Open diagnostics when anything looks blocked.</text>

  <path d="M1180 730C1220 760 1260 775 1170 650" stroke="#DC2626" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1085" y="778" fill="#DC2626" font-family="Arial, sans-serif" font-size="28" font-weight="700">3. Start dispatch</text>
  <text x="1060" y="812" fill="#DC2626" font-family="Arial, sans-serif" font-size="22">Server-approved payloads only.</text>
</svg>

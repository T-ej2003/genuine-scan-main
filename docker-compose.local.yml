services:
  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mscqrminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mscqrminiochange}

  minio-init:
    entrypoint: >
      /bin/sh -c
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-mscqrminio} ${MINIO_ROOT_PASSWORD:-mscqrminiochange} &&
      mc mb --ignore-existing local/${OBJECT_STORAGE_BUCKET:-mscqr-artifacts}"

  backend:
    environment:
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-mscqrminio}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-mscqrminiochange}

  worker:
    environment:
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-mscqrminio}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-mscqrminiochange}

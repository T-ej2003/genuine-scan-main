services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genuine-scan-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-4000}
    expose:
      - "4000"
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: genuine-scan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - app

networks:
  app:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genuine-scan-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PUBLIC_SCAN_WEB_BASE_URL: ${PUBLIC_SCAN_WEB_BASE_URL:-http://localhost}
      PUBLIC_VERIFY_WEB_BASE_URL: ${PUBLIC_VERIFY_WEB_BASE_URL:-http://localhost}
      SCAN_RATE_LIMIT_PER_MIN: ${SCAN_RATE_LIMIT_PER_MIN:-60}
      QR_TOKEN_EXP_DAYS: ${QR_TOKEN_EXP_DAYS:-3650}
      QR_SIGN_PRIVATE_KEY: ${QR_SIGN_PRIVATE_KEY:-}
      QR_SIGN_PUBLIC_KEY: ${QR_SIGN_PUBLIC_KEY:-}
      QR_SIGN_HMAC_SECRET: ${QR_SIGN_HMAC_SECRET:-}
    expose:
      - "4000"
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: genuine-scan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - app

networks:
  app:
    driver: bridge

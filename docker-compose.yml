services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genuine-scan-backend
    restart: unless-stopped
    init: true
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-4000}
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health/db', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app

  mock-printer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genuine-scan-mock-printer
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      MOCK_PRINTER_HOST: 0.0.0.0
      MOCK_PRINTER_PORT: 9100
      MOCK_PRINTER_CONTROL_HOST: 0.0.0.0
      MOCK_PRINTER_CONTROL_PORT: 3001
    expose:
      - "9100"
      - "3001"
    ports:
      - "${MOCK_PRINTER_CONTROL_PORT:-3001}:3001"
    command: ["node", "mock-printer/server.js"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/status', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 10s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: genuine-scan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      SSL_ENABLED: ${SSL_ENABLED:-auto}
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_SSL_PORT:-443}:443"
    volumes:
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app

networks:
  app:
    driver: bridge

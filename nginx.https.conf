server {
  listen 80;
  server_name mscqr.com www.mscqr.com _;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://www.mscqr.com$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name mscqr.com;

  ssl_certificate /etc/letsencrypt/live/mscqr.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mscqr.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://www.mscqr.com$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name www.mscqr.com _;

  ssl_certificate /etc/letsencrypt/live/mscqr.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mscqr.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location = /api {
    return 301 /api/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

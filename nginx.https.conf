limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_req_zone $binary_remote_addr zone=api_verify_ip:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_scan_ip:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_incidents_ip:10m rate=20r/m;

server {
  listen 80;
  server_name mscqr.com www.mscqr.com _;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://www.mscqr.com$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name mscqr.com;

  ssl_certificate /etc/letsencrypt/live/mscqr.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mscqr.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://www.mscqr.com$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name www.mscqr.com _;
  client_max_body_size 8m;
  client_body_timeout 20s;
  client_header_timeout 20s;
  send_timeout 30s;
  keepalive_timeout 30s;
  large_client_header_buffers 4 8k;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Permitted-Cross-Domain-Policies "none" always;
  add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Report-To '{"group":"csp-endpoint","max_age":10886400,"endpoints":[{"url":"https://www.mscqr.com/api/telemetry/csp-report"}]}' always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: ws: wss:; worker-src 'self' blob:; form-action 'self'; report-uri /api/telemetry/csp-report; report-to csp-endpoint;" always;
  add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: ws: wss:; worker-src 'self' blob:; form-action 'self'; report-uri /api/telemetry/csp-report; report-to csp-endpoint;" always;

  ssl_certificate /etc/letsencrypt/live/mscqr.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mscqr.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
  add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location ~ ^/api/verify {
    limit_conn conn_per_ip 40;
    limit_req zone=api_verify_ip burst=20 nodelay;
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_hide_header X-Powered-By;
    proxy_buffering off;
    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
  }

  location ~ ^/api/scan {
    limit_conn conn_per_ip 40;
    limit_req zone=api_scan_ip burst=30 nodelay;
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_hide_header X-Powered-By;
    proxy_buffering off;
    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
  }

  location ~ ^/api/incidents {
    limit_conn conn_per_ip 30;
    limit_req zone=api_incidents_ip burst=15 nodelay;
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_hide_header X-Powered-By;
    proxy_buffering off;
    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
  }

  # NEW: specifically proxy /api/health/* to backend root /health
  location ~ ^/api/health/?(.*)$ {
    proxy_pass http://backend:4000/health/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_hide_header X-Powered-By;
    proxy_buffering off;
    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
  }

  location /api/ {
    limit_conn conn_per_ip 50;
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_hide_header X-Powered-By;
    proxy_buffering off;
    proxy_connect_timeout 15s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
  }

  location = /api {
    return 301 /api/;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
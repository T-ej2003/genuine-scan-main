name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend security guardrails
        run: npm run check:security-guardrails

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Strict typecheck
        run: npm run typecheck

      - name: Code-size budgets
        run: npm run check:budgets

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Playwright smoke suite
        run: npm run test:e2e

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Backend build
        run: npm --prefix backend run build

      - name: Backend test suite
        run: npm --prefix backend test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker compose build
        run: docker compose build backend frontend

name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Baseline secret-pattern guard
        run: node scripts/check-baseline-secret-patterns.mjs

      - name: Dependency audit gate
        run: npm run check:dependency-audit

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Security and release guardrails
        env:
          REQUIRE_RELEASE_EVIDENCE_REFS: ${{ github.ref == 'refs/heads/main' }}
          PROVENANCE_BACKFILL_EVIDENCE_REF: ${{ vars.RC_PROVENANCE_BACKFILL_EVIDENCE_REF }}
          SECRET_ROTATION_EVIDENCE_REF: ${{ vars.RC_SECRET_ROTATION_EVIDENCE_REF }}
          INCIDENT_DRILL_EVIDENCE_REF: ${{ vars.RC_INCIDENT_DRILL_EVIDENCE_REF }}
        run: npm run verify:ci:security

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend quality contract
        env:
          ENFORCE_LINT_CHANGED: ${{ vars.ENFORCE_LINT_CHANGED }}
        run: npm run verify:ci:frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Playwright smoke suite
        run: npm run verify:ci:frontend:e2e

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Backend quality contract
        run: npm run verify:ci:backend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Frontend Docker compose build
        env:
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password
          OBJECT_STORAGE_ACCESS_KEY: ci-object-user
          OBJECT_STORAGE_SECRET_KEY: ci-object-password
        run: docker compose build frontend

      - name: Backend linux/amd64 buildx validation
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --file backend/Dockerfile \
            --build-arg GIT_SHA=ci-${GITHUB_SHA} \
            --tag mscqr-backend-ci:${GITHUB_SHA} \
            .

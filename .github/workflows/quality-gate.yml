name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend security guardrails
        run: npm run check:security-guardrails

      - name: Baseline secret-pattern guard
        run: node scripts/check-baseline-secret-patterns.mjs

      - name: Dependency audit gate
        run: npm run check:dependency-audit

      - name: Trust observability guardrails
        run: npm run check:trust-observability

      - name: Trust alert bindings
        run: npm run check:trust-alert-bindings

      - name: CloudWatch config guardrails
        run: npm run check:cloudwatch-config

      - name: Rotation evidence gate
        run: npm run check:rotation-evidence

      - name: Rotation cleanup gate
        run: npm run check:rotation-cleanup

      - name: Customer auth cutover gate
        run: npm run check:customer-auth-cutover

      - name: Nginx hardening invariants
        run: npm run check:nginx-hardening

      - name: Public metadata surface
        run: npm run check:public-metadata-surface

      - name: Release evidence refs
        run: npm run check:release-evidence-refs

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Strict typecheck
        run: npm run typecheck

      - name: Lint changed files
        env:
          ENFORCE_LINT_CHANGED: ${{ vars.ENFORCE_LINT_CHANGED }}
        run: npm run lint:changed

      - name: Architecture guardrails
        run: node scripts/check-architecture-guardrails.mjs

      - name: Code-size budgets
        run: npm run check:budgets

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke suite
        run: npm run test:e2e

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Backend build
        run: npm --prefix backend run build

      - name: Backend trust-critical suite
        run: npm --prefix backend run test:trust-critical:compiled

      - name: Backend test suite
        run: npm --prefix backend test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Frontend Docker compose build
        env:
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password
          OBJECT_STORAGE_ACCESS_KEY: ci-object-user
          OBJECT_STORAGE_SECRET_KEY: ci-object-password
        run: docker compose build frontend

      - name: Backend linux/amd64 buildx validation
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --file backend/Dockerfile \
            --build-arg GIT_SHA=ci-${GITHUB_SHA} \
            --tag mscqr-backend-ci:${GITHUB_SHA} \
            .

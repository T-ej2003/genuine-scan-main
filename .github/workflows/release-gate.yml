name: Release Gate

on:
  workflow_run:
    workflows:
      - Deployment Audit
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Confirm deployment gate
        run: echo "Deployment audit passed for ${{ github.event.workflow_run.head_sha }}"

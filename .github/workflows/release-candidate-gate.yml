name: Release Candidate Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - codex/merge-main-ours-test2
      - release-candidate/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-candidate-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rc-trust-critical:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Security guardrails
        run: npm run check:security-guardrails

      - name: Prisma client generation
        run: npm --prefix backend run prisma:generate

      - name: Trust-critical suite
        run: npm run test:trust-critical

  rc-staging-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - rc-trust-critical
    environment: staging
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    env:
      SMOKE_BASE_URL: ${{ vars.STAGING_SMOKE_BASE_URL }}
      SMOKE_API_BASE_URL: ${{ vars.STAGING_SMOKE_API_BASE_URL }}
      SMOKE_LOGIN_EMAIL: ${{ secrets.STAGING_SMOKE_LOGIN_EMAIL }}
      SMOKE_LOGIN_PASSWORD: ${{ secrets.STAGING_SMOKE_LOGIN_PASSWORD }}
      SMOKE_ADMIN_MFA_CODE: ${{ secrets.STAGING_SMOKE_ADMIN_MFA_CODE }}
      SMOKE_ADMIN_STEP_UP_CODE: ${{ secrets.STAGING_SMOKE_ADMIN_STEP_UP_CODE }}
      SMOKE_STEP_UP_PASSWORD: ${{ secrets.STAGING_SMOKE_STEP_UP_PASSWORD }}
      SMOKE_VERIFY_CODE: ${{ vars.STAGING_SMOKE_VERIFY_CODE }}
      SMOKE_BATCH_PRINT_ENDPOINT: ${{ vars.STAGING_SMOKE_BATCH_PRINT_ENDPOINT }}
      SMOKE_BATCH_PRINT_PAYLOAD_JSON: ${{ vars.STAGING_SMOKE_BATCH_PRINT_PAYLOAD_JSON }}
      SMOKE_INCIDENT_ENDPOINT: ${{ vars.STAGING_SMOKE_INCIDENT_ENDPOINT }}
      SMOKE_INCIDENT_PAYLOAD_JSON: ${{ vars.STAGING_SMOKE_INCIDENT_PAYLOAD_JSON }}
      SMOKE_EVIDENCE_URL: ${{ vars.STAGING_SMOKE_EVIDENCE_URL }}
      SMOKE_EVIDENCE_PATH: ${{ vars.STAGING_SMOKE_EVIDENCE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate staging smoke configuration
        run: |
          missing=0
          if [ -z "${SMOKE_BASE_URL}" ]; then
            echo "::error::Missing required var STAGING_SMOKE_BASE_URL"
            missing=1
          fi
          if [ -z "${SMOKE_LOGIN_EMAIL}" ]; then
            echo "::error::Missing required secret STAGING_SMOKE_LOGIN_EMAIL"
            missing=1
          fi
          if [ -z "${SMOKE_LOGIN_PASSWORD}" ]; then
            echo "::error::Missing required secret STAGING_SMOKE_LOGIN_PASSWORD"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run staging smoke gate
        run: |
          set -o pipefail
          npm run smoke:release | tee smoke-release.log

      - name: Upload staging smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-log
          path: smoke-release.log
          if-no-files-found: ignore

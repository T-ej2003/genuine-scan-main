name: Deploy ECS Release

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref, branch, or SHA to deploy"
        required: false
        type: string
      publish_images:
        description: "Publish images in this run before deploying"
        required: true
        type: boolean
        default: true
      aws_region:
        description: "AWS region for ECR and ECS"
        required: true
        type: string
        default: eu-west-2
      platforms:
        description: "Comma-separated manifest platforms"
        required: true
        type: string
        default: linux/amd64,linux/arm64
      backend_ecr_repo:
        description: "Backend ECR repository"
        required: true
        type: string
        default: mscqr-backend
      worker_ecr_repo:
        description: "Worker ECR repository"
        required: true
        type: string
        default: mscqr-worker
      backend_cluster:
        description: "Backend ECS cluster"
        required: true
        type: string
      backend_service:
        description: "Backend ECS service"
        required: true
        type: string
      backend_task_definition:
        description: "Backend task definition family or ARN"
        required: true
        type: string
      backend_container_name:
        description: "Backend task container name to update"
        required: true
        type: string
        default: backend
      backend_version_url:
        description: "Public backend /version URL for post-deploy SHA verification"
        required: true
        type: string
      worker_cluster:
        description: "Worker ECS cluster"
        required: true
        type: string
      worker_service:
        description: "Worker ECS service"
        required: true
        type: string
      worker_task_definition:
        description: "Worker task definition family or ARN"
        required: true
        type: string
      worker_container_name:
        description: "Worker task container name to update"
        required: true
        type: string
        default: worker

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      PLATFORMS: ${{ inputs.platforms }}
      BACKEND_ECR_REPO: ${{ inputs.backend_ecr_repo }}
      WORKER_ECR_REPO: ${{ inputs.worker_ecr_repo }}
      COSIGN_EXPERIMENTAL: "1"
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref_name }}
          fetch-depth: 0

      - name: Validate AWS authentication inputs
        id: auth-mode
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$AWS_ROLE_TO_ASSUME" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Configure repository variable AWS_ROLE_TO_ASSUME for OIDC, or set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as fallback secrets."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        if: steps.auth-mode.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Configure AWS credentials via access keys
        if: steps.auth-mode.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        if: inputs.publish_images
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: inputs.publish_images
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        if: inputs.publish_images
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Resolve deployment metadata
        id: image-meta
        run: |
          echo "image_tag=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"
          echo "images_file=$RUNNER_TEMP/deploy-images.jsonl" >> "$GITHUB_OUTPUT"
          : > "$RUNNER_TEMP/deploy-images.jsonl"

      - name: Enforce ECR repository controls
        run: ./scripts/aws/apply-ecr-repository-controls.sh both

      - name: Publish images for this release
        if: inputs.publish_images
        env:
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
          AWS_ACCOUNT_ID: ${{ steps.image-meta.outputs.account_id }}
          OUTPUT_FILE: ${{ steps.image-meta.outputs.images_file }}
        run: ./scripts/aws/publish-ecs-images.sh both

      - name: Generate SBOMs, provenance, and signatures
        if: inputs.publish_images
        env:
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
          IMAGES_FILE: ${{ steps.image-meta.outputs.images_file }}
        run: |
          mkdir -p "$RUNNER_TEMP/release-artifacts"
          while IFS= read -r record; do
            [ -n "$record" ] || continue
            repository="$(node --input-type=module -e 'const record = JSON.parse(process.argv[1]); process.stdout.write(record.repository);' "$record")"
            image_ref="$(node --input-type=module -e 'const record = JSON.parse(process.argv[1]); process.stdout.write(record.image_ref);' "$record")"
            image_digest="$(node --input-type=module -e 'const record = JSON.parse(process.argv[1]); process.stdout.write(record.image_digest);' "$record")"
            sbom_file="$RUNNER_TEMP/release-artifacts/${repository}-sbom.spdx.json"
            provenance_file="$RUNNER_TEMP/release-artifacts/${repository}-provenance.json"

            syft "$image_ref" -o "spdx-json=$sbom_file"

            node --input-type=module -e 'import fs from "node:fs"; const [outPath, repository, imageRef, imageDigest, imageTag, repoName, workflowName, runId, runAttempt, runUrl, platforms] = process.argv.slice(1); const predicate = { buildType: "mscqr-release-provenance", builder: { id: `${repoName}/${workflowName}`, runId, runAttempt, runUrl }, invocation: { repository: repoName, ref: process.env.GITHUB_REF || "", sha: imageTag, workflow: workflowName, actor: process.env.GITHUB_ACTOR || "" }, metadata: { builtAt: new Date().toISOString(), platforms: platforms.split(",").map((value) => value.trim()).filter(Boolean) }, subject: { repository, imageRef, imageDigest } }; fs.writeFileSync(outPath, JSON.stringify(predicate, null, 2));' "$provenance_file" "$repository" "$image_ref" "$image_digest" "$IMAGE_TAG" "${{ github.repository }}" "${{ github.workflow }}" "${{ github.run_id }}" "${{ github.run_attempt }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" "$PLATFORMS"

            cosign sign --yes "$image_ref"
            cosign attest --yes --type spdxjson --predicate "$sbom_file" "$image_ref"
            cosign attest --yes --type mscqr-release-provenance --predicate "$provenance_file" "$image_ref"
          done < "$IMAGES_FILE"

      - name: Resolve existing image refs when publish is skipped
        if: ${{ !inputs.publish_images }}
        env:
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
          ACCOUNT_ID: ${{ steps.image-meta.outputs.account_id }}
          IMAGES_FILE: ${{ steps.image-meta.outputs.images_file }}
        run: |
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          for repo in "$BACKEND_ECR_REPO" "$WORKER_ECR_REPO"; do
            image_digest="$(
              aws ecr describe-images \
                --region "$AWS_REGION" \
                --repository-name "$repo" \
                --image-ids imageTag="$IMAGE_TAG" \
                --query 'imageDetails[0].imageDigest' \
                --output text
            )"
            image_uri="${REGISTRY}/${repo}:${IMAGE_TAG}"
            image_ref="${REGISTRY}/${repo}@${image_digest}"
            node --input-type=module -e 'import fs from "node:fs"; const [outputPath, repository, imageUri, imageTag, imageDigest, imageRef] = process.argv.slice(1); fs.appendFileSync(outputPath, `${JSON.stringify({ repository, image_uri: imageUri, image_tag: imageTag, image_digest: imageDigest, image_ref: imageRef })}\n`);' "$IMAGES_FILE" "$repo" "$image_uri" "$IMAGE_TAG" "$image_digest" "$image_ref"
          done

      - name: Verify release artifacts before deploy
        env:
          IMAGES_FILE: ${{ steps.image-meta.outputs.images_file }}
          COSIGN_CERT_IDENTITY_REGEXP: "^https://github.com/${{ github.repository }}/.github/workflows/(publish-ecs-images|deploy-ecs-release).yml@.*$"
        run: |
          while IFS= read -r record; do
            [ -n "$record" ] || continue
            image_ref="$(node --input-type=module -e 'const record = JSON.parse(process.argv[1]); process.stdout.write(record.image_ref);' "$record")"
            REQUIRED_PLATFORMS="$PLATFORMS" \
              ./scripts/aws/verify-release-artifacts.sh "$image_ref"
          done < "$IMAGES_FILE"

      - name: Deploy backend ECS service
        env:
          ACCOUNT_ID: ${{ steps.image-meta.outputs.account_id }}
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
          IMAGES_FILE: ${{ steps.image-meta.outputs.images_file }}
          CLUSTER_NAME: ${{ inputs.backend_cluster }}
          SERVICE_NAME: ${{ inputs.backend_service }}
          TASK_DEFINITION: ${{ inputs.backend_task_definition }}
          CONTAINER_NAME: ${{ inputs.backend_container_name }}
          VERSION_URL: ${{ inputs.backend_version_url }}
          EXPECTED_GIT_SHA: ${{ steps.image-meta.outputs.image_tag }}
        run: |
          IMAGE_URI="$(node --input-type=module -e '
            import fs from "node:fs";
            const records = fs.readFileSync(process.argv[1], "utf8").trim().split("\n").filter(Boolean).map((line) => JSON.parse(line));
            const record = records.find((candidate) => candidate.repository === process.argv[2]);
            if (!record) throw new Error(`No image record for ${process.argv[2]}`);
            process.stdout.write(record.image_ref);
          ' "$IMAGES_FILE" "$BACKEND_ECR_REPO")"
          export IMAGE_URI
          ./scripts/aws/deploy-ecs-service.sh

      - name: Deploy worker ECS service
        env:
          ACCOUNT_ID: ${{ steps.image-meta.outputs.account_id }}
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
          IMAGES_FILE: ${{ steps.image-meta.outputs.images_file }}
          CLUSTER_NAME: ${{ inputs.worker_cluster }}
          SERVICE_NAME: ${{ inputs.worker_service }}
          TASK_DEFINITION: ${{ inputs.worker_task_definition }}
          CONTAINER_NAME: ${{ inputs.worker_container_name }}
        run: |
          IMAGE_URI="$(node --input-type=module -e '
            import fs from "node:fs";
            const records = fs.readFileSync(process.argv[1], "utf8").trim().split("\n").filter(Boolean).map((line) => JSON.parse(line));
            const record = records.find((candidate) => candidate.repository === process.argv[2]);
            if (!record) throw new Error(`No image record for ${process.argv[2]}`);
            process.stdout.write(record.image_ref);
          ' "$IMAGES_FILE" "$WORKER_ECR_REPO")"
          export IMAGE_URI
          ./scripts/aws/deploy-ecs-service.sh

      - name: Summarize deployed release
        env:
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
          IMAGES_FILE: ${{ steps.image-meta.outputs.images_file }}
        run: |
          {
            echo "## ECS deploy summary"
            echo
            echo "- Immutable git SHA: \`$IMAGE_TAG\`"
            echo "- Backend /version smoke check passed: \`${{ inputs.backend_version_url }}\`"
            echo
            while IFS= read -r record; do
              [ -n "$record" ] || continue
              repo="$(node --input-type=module -e 'const record = JSON.parse(process.argv[1]); process.stdout.write(record.repository);' "$record")"
              image_ref="$(node --input-type=module -e 'const record = JSON.parse(process.argv[1]); process.stdout.write(record.image_ref);' "$record")"
              echo "- ${repo}: \`${image_ref}\`"
            done < "$IMAGES_FILE"
          } >> "$GITHUB_STEP_SUMMARY"

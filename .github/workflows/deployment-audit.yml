name: Deployment Audit

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Dependency audit gate
        run: npm run check:dependency-audit

      - name: Trust observability guardrails
        run: npm run check:trust-observability

      - name: Trust alert bindings
        run: npm run check:trust-alert-bindings

      - name: CloudWatch config guardrails
        run: npm run check:cloudwatch-config

      - name: Rotation evidence gate
        run: npm run check:rotation-evidence

      - name: Rotation cleanup gate
        run: npm run check:rotation-cleanup

      - name: Customer auth cutover gate
        run: npm run check:customer-auth-cutover

      - name: Nginx hardening invariants
        run: npm run check:nginx-hardening

      - name: Public metadata surface
        run: npm run check:public-metadata-surface

      - name: Release evidence refs
        env:
          REQUIRE_RELEASE_EVIDENCE_REFS: ${{ github.ref == 'refs/heads/main' }}
          PROVENANCE_BACKFILL_EVIDENCE_REF: ${{ vars.RC_PROVENANCE_BACKFILL_EVIDENCE_REF }}
          SECRET_ROTATION_EVIDENCE_REF: ${{ vars.RC_SECRET_ROTATION_EVIDENCE_REF }}
          INCIDENT_DRILL_EVIDENCE_REF: ${{ vars.RC_INCIDENT_DRILL_EVIDENCE_REF }}
        run: npm run check:release-evidence-refs

      - name: Run full release validation
        run: npm run verify:release

  audit:
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare artifacts
        run: mkdir -p audit-artifacts

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3

      - name: Install OSV Scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV Scanner
        run: ./osv-scanner --recursive .

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --redact --report-format sarif --report-path audit-artifacts/gitleaks.sarif

      - name: Detect IaC files
        id: iac-detect
        run: |
          if find . \( -name '*.tf' -o -name '*.tf.json' -o -name '*.tfvars' -o -name 'docker-compose.yml' -o -path '*/k8s/*.yml' -o -path '*/k8s/*.yaml' -o -path '*/helm/Chart.yaml' \) -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trivy IaC scan
        if: steps.iac-detect.outputs.found == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: audit-artifacts/iac-trivy.sarif

      - name: Detect Dockerfile
        id: docker-detect
        run: |
          if [ -f Dockerfile ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "dockerfile=Dockerfile" >> "$GITHUB_OUTPUT"
            echo "context=." >> "$GITHUB_OUTPUT"
          elif [ -f backend/Dockerfile ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "dockerfile=backend/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "context=backend" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build container for scan
        if: steps.docker-detect.outputs.found == 'true'
        run: docker build -t deployment-audit:latest -f "${{ steps.docker-detect.outputs.dockerfile }}" "${{ steps.docker-detect.outputs.context }}"

      - name: Trivy container scan
        if: steps.docker-detect.outputs.found == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: deployment-audit:latest
          format: sarif
          output: audit-artifacts/container-trivy.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: audit-artifacts/sbom.spdx.json

      - name: Attest SBOM provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: audit-artifacts/sbom.spdx.json

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-audit-artifacts
          path: audit-artifacts
          if-no-files-found: warn
